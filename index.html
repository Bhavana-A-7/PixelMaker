<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pixel Art Maker</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🎨 Pixel Art Maker</h1>

        <div class="controls">

            <label>Rows</label>
            <input type="number" id="rows" value="16" min="1" max="64">

            <label>Cols</label>
            <input type="number" id="cols" value="16" min="1" max="64">

            <button id="createGrid">Create Grid</button>

            <input type="color" id="colorPicker" value="#ff69b4">

            <button id="clearGrid">Clear</button>

            <button id="undo">Undo</button>

            <button id="redo">Redo</button>

            <button id="exportData">Export PNG</button>

        </div>

        <div id="grid"></div>

    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
