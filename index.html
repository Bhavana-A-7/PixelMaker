<!DOCTYPE html>
<html>
<head>
    <title>Pixel Art Maker</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Pixel Art Maker</h1>

    <div class="controls">

        <label>Rows:</label>
        <input type="number" id="rows" value="32">

        <label>Cols:</label>
        <input type="number" id="cols" value="32">

        <button id="createGrid">Create Grid</button>

        <input type="color" id="colorPicker" value="#000000">

        <button id="eyedropper">Eyedropper</button>

        <button id="undo">Undo</button>

        <button id="redo">Redo</button>

        <button id="clearGrid">Clear</button>

        <button id="exportData">Export</button>

    </div>

    <div id="grid"></div>

    <textarea id="output" rows="10" cols="50"></textarea>

    <script src="script.js"></script>

</body>
</html>
